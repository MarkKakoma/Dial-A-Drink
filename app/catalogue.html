<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dial A Drink — Catalogue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="../assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon-16.png" />
  <link rel="icon" href="../assets/favicon.ico" />
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png" />
</head>
<body>
  <div class="stage">
    <div class="phone">
      <div class="phone__notch"></div>
      <div class="phone__screen">

        <!-- status bar -->
        <div class="statusbar">
          <span>9:41</span>
          <span class="statusbar__icons"><span>📶</span><span>🔋</span></span>
        </div>

        <!-- app bar with search -->
        <header class="cat-head">
          <div class="cat-head__row">
            <a href="home.html" class="appbar__back">‹</a>
            <span class="appbar__title">Catalogue</span>
            <a href="cart.html" class="cat-head__cart">🛒<span class="cat-head__badge">3</span></a>
          </div>
          <div class="cat-search">
            <span>🔍</span>
            <input type="text" id="search" placeholder="Search drinks…" />
          </div>
        </header>

        <!-- category chip strip -->
        <nav class="chips" id="chips"></nav>

        <!-- product grid -->
        <div class="screen" id="screen">
          <div class="grid" id="grid"></div>
          <div style="height:16px;"></div>
        </div>

        <!-- bottom tab bar -->
        <nav class="tabbar">
          <a href="home.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.5"/></svg>Home</a>
          <a href="catalogue.html" class="is-active"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6v3.2c0 .6.2 1.1.6 1.6l1.2 1.4c.4.5.6 1 .6 1.6V20a1 1 0 0 1-1 1H8.6a1 1 0 0 1-1-1v-8.6c0-.6.2-1.1.6-1.6l1.2-1.4c.4-.5.6-1 .6-1.6V3z"/><path d="M9 12h6"/></svg>Shop</a>
          <a href="orders.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2.5h9l3 3V21l-2-1.2L14 21l-2-1.2L10 21l-2-1.2L6 21V2.5z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>Orders</a>
          <a href="credit.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="5.5" width="19" height="13" rx="2.5"/><path d="M2.5 9.5h19"/><path d="M6 14.5h4"/></svg>Credit</a>
          <a href="account.html"><svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M5 20c0-3.6 3.1-5.6 7-5.6s7 2 7 5.6"/></svg>Account</a>
        </nav>

      </div>
    </div>
  </div>

  <script src="products.js"></script>
  <script src="drinkart.js"></script>
  <script>
    const chipsEl = document.getElementById('chips');
    const gridEl  = document.getElementById('grid');
    const searchEl= document.getElementById('search');
    let activeCat = 'All';

    // build chips
    function renderChips() {
      const all = [{name:'All', emoji:'✨'}, ...CATEGORIES];
      chipsEl.innerHTML = all.map(c =>
        `<button class="chip ${c.name===activeCat?'is-active':''}" data-cat="${c.name}">
           <span>${c.emoji}</span>${c.name}
         </button>`
      ).join('');
      chipsEl.querySelectorAll('.chip').forEach(b =>
        b.addEventListener('click', () => { activeCat = b.dataset.cat; renderChips(); renderGrid(); })
      );
    }

    // build grid
    function renderGrid() {
      const q = (searchEl.value || '').toLowerCase();
      let items = PRODUCTS;
      if (activeCat !== 'All') items = items.filter(p => p.cat === activeCat);
      if (q) items = items.filter(p => p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q));

      if (!items.length) {
        gridEl.innerHTML = `<div class="grid-empty">No drinks match “${searchEl.value}”. Try another search.</div>`;
        return;
      }
      gridEl.innerHTML = items.map(p => `
        <a class="pcard" href="product.html?id=${p.id}">
          <div class="pcard__img">${drinkArt(p)}</div>
          <div class="pcard__body">
            <div class="pcard__name">${p.name}</div>
            <div class="pcard__size">${p.size}</div>
            <div class="pcard__foot">
              <span class="pcard__price">${money(p.price)}</span>
              <span class="pcard__add">+</span>
            </div>
          </div>
        </a>
      `).join('');
    }

    searchEl.addEventListener('input', renderGrid);
    renderChips();
    renderGrid();
  </script>
</body>
</html>
